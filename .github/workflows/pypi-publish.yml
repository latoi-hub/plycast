# Build wheels/sdist and publish to PyPI.
#
# Trusted publishing (recommended): configure your PyPI project to trust this GitHub repo
# so no long-lived PYPI_API_TOKEN is needed. See:
# https://docs.pypi.org/trusted-publishers/
#
# Alternative: set repository secret PYPI_API_TOKEN and uncomment the "with:" block below.

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # If not using trusted publishing, set secret PYPI_API_TOKEN on the repo and use:
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
