services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: plycast-libretranslate
    ports:
      - "5001:5000"
    environment:
      - LT_HOST=0.0.0.0
      - LT_PORT=5000
      - LT_LOAD_ONLY=en,es,fr,de,it,pt,ru,ja,ko,zh,vi,ar,hi,id,tr,nl,pl,th
    restart: unless-stopped
